# Single source of truth for Terraform and provider versions
# Changes to this file will trigger platform image rebuild
#
# These versions are chosen to satisfy the most restrictive constraints
# across all modules in this repository.

terraform_version: "1.14.3"

providers:
  aws:
    version: "6.28.0"  # Satisfies >= 6.28 (most restrictive constraint)
    source: "hashicorp/aws"

  time:
    version: "0.12.0"  # Satisfies >= 0.9
    source: "hashicorp/time"

  random:
    version: "3.6.0"  # Satisfies ~> 3.0
    source: "hashicorp/random"

  http:
    version: "3.4.0"  # Satisfies >= 3.4 and ~> 3.0
    source: "hashicorp/http"

  "null":  # Quoted because 'null' is a YAML keyword
    version: "3.2.0"  # Satisfies >= 3.0
    source: "hashicorp/null"
