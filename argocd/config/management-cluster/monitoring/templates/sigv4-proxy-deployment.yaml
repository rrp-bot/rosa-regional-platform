apiVersion: apps/v1
kind: Deployment
metadata:
  name: sigv4-proxy
  labels:
    app.kubernetes.io/name: sigv4-proxy
    app.kubernetes.io/component: metrics-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sigv4-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sigv4-proxy
    spec:
      serviceAccountName: sigv4-proxy
      containers:
        - name: sigv4-proxy
          image: public.ecr.aws/aws-observability/aws-sigv4-proxy:latest
          args:
            - --name
            - execute-api
            - --region
            - {{ .Values.global.aws_region | default "" | quote }}
            - --host
            - {{ (urlParse (.Values.global.rhobs_api_url | default "")).host | quote }}
            - --port
            - ":8005"
            - --strip
            - Content-Encoding
          ports:
            - name: proxy
              containerPort: 8005
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 100m
              memory: 512Mi
