# Direct ArgoCD configuration
# This section will be passed to the upstream ArgoCD chart
argo-cd:
  # High Availability configuration
  ha:
    enabled: true

  # Server configuration
  server:
    autoscaling:
      enabled: true
      minReplicas: 2
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

  # Controller configuration
  controller:
    resources:
      limits:
        cpu: 1000m
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 1Gi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

  # Repo Server configuration
  repoServer:
    autoscaling:
      enabled: true
      minReplicas: 2
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

  # ApplicationSet controller
  applicationSet:
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

  # Dex configuration
  dex:
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi

  # Notifications controller
  notifications:
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi

  # Redis configuration
  redis:
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi

  # Redis Secret Init configuration
  redisSecretInit:
    enabled: false # Ref: https://github.com/argoproj/argo-helm/issues/2887

  # Configuration parameters
  configs:
    params:
      server.insecure: false
