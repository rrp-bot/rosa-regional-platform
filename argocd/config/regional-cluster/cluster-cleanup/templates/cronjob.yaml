apiVersion: batch/v1
kind: CronJob
metadata:
  name: cluster-cleanup
  namespace: {{ .Values.clusterCleanup.namespace }}
spec:
  schedule: {{ .Values.clusterCleanup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 600
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: hyperfleet-api-sa
          containers:
            - name: cleanup
              image: {{ .Values.clusterCleanup.image.repository }}:{{ .Values.clusterCleanup.image.tag }}
              env:
                - name: MAX_AGE_HOURS
                  value: {{ .Values.clusterCleanup.maxAgeHours | quote }}
                - name: MAESTRO_NS
                  value: {{ .Values.clusterCleanup.maestroNamespace }}
                - name: MAESTRO_URL
                  value: {{ .Values.clusterCleanup.maestroRestUrl }}
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.clusterCleanup.dbSecretName }}
                      key: db.user
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.clusterCleanup.dbSecretName }}
                      key: db.password
                - name: PGHOST
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.clusterCleanup.dbSecretName }}
                      key: db.host
                - name: PGPORT
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.clusterCleanup.dbSecretName }}
                      key: db.port
                - name: PGDATABASE
                  value: hyperfleet
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  # Install kubectl
                  wget -qO /usr/local/bin/kubectl "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl"
                  chmod +x /usr/local/bin/kubectl

                  maestro_exec() {
                    kubectl exec -n "$MAESTRO_NS" "$MAESTRO_POD" -c service -- /usr/local/bin/maestro "$@"
                  }
                  MAESTRO_POD=$(kubectl get pod -n "$MAESTRO_NS" -l app=maestro,component=maestro-server \
                    --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}')

                  CUTOFF=$(psql -tA -c "SELECT to_char(NOW() - INTERVAL '${MAX_AGE_HOURS} hours', 'YYYY-MM-DD\"T\"HH24:MI:SS');")
                  echo "=== Cluster Cleanup - $(date -u) ==="
                  echo "Deleting resources older than ${MAX_AGE_HOURS}h (before ${CUTOFF})"

                  # Delete clusters older than MAX_AGE_HOURS
                  DELETED_CLUSTERS=$(psql -tA -c "
                    WITH deleted AS (
                      DELETE FROM clusters
                      WHERE deleted_at IS NULL
                        AND created_time < NOW() - INTERVAL '${MAX_AGE_HOURS} hours'
                      RETURNING id, name
                    ) SELECT count(*) FROM deleted;
                  ")
                  psql -qc "DELETE FROM adapter_statuses WHERE resource_id IN (
                    SELECT id FROM clusters WHERE deleted_at IS NULL
                      AND created_time < NOW() - INTERVAL '${MAX_AGE_HOURS} hours'
                  );" 2>/dev/null || true
                  echo "Deleted $DELETED_CLUSTERS cluster(s) from DB"

                  # Delete resource bundles older than MAX_AGE_HOURS
                  set +e
                  ALL_BUNDLE_IDS=""
                  page=1
                  while true; do
                    PAGE_URL="${MAESTRO_URL}/api/maestro/v1/resource-bundles?page=${page}&size=200&search=deleted_at+IS+NULL"
                    PAGE_RAW=$(wget -qO- "$PAGE_URL") || { echo "ERROR: wget failed for $PAGE_URL (exit $?)"; exit 1; }
                    PAGE_IDS=$(echo "$PAGE_RAW" | sed 's/,/\n/g' | grep '"href"' | sed 's|.*/||;s|".*||') || true
                    [ -z "$PAGE_IDS" ] && break
                    ALL_BUNDLE_IDS="${ALL_BUNDLE_IDS} ${PAGE_IDS}"
                    page=$((page + 1))
                  done

                  BUNDLE_DEL_COUNT=0
                  for bid in $ALL_BUNDLE_IDS; do
                    DETAIL=$(maestro_exec resourcebundle get "$bid" --rest-url="$MAESTRO_URL" -o json 2>/dev/null) || continue
                    BUNDLE_CREATED=$(echo "$DETAIL" | sed 's/,/\n/g' | grep '"created_at"' | head -1 | sed 's/.*"created_at":[[:space:]]*"//;s/".*//')
                    [ -z "$BUNDLE_CREATED" ] && continue
                    if [ "$BUNDLE_CREATED" \< "$CUTOFF" ]; then
                      echo "  Deleting bundle: $bid (created: $BUNDLE_CREATED)"
                      maestro_exec resourcebundle delete "$bid" -y --rest-url="$MAESTRO_URL" --grpc-server-address=127.0.0.1:8090 2>&1 || echo "    WARN: failed to delete $bid"
                      BUNDLE_DEL_COUNT=$((BUNDLE_DEL_COUNT + 1))
                    fi
                  done
                  echo "Deleted $BUNDLE_DEL_COUNT resource bundle(s)"

                  REMAINING_CLUSTERS=$(psql -tA -c "SELECT COUNT(*) FROM clusters WHERE deleted_at IS NULL;")
                  REMAINING_BUNDLES=$(echo $ALL_BUNDLE_IDS | wc -w | tr -d ' ')
                  REMAINING_BUNDLES=$((REMAINING_BUNDLES - BUNDLE_DEL_COUNT))
                  echo "=== Done. Remaining clusters: $REMAINING_CLUSTERS, bundles: $REMAINING_BUNDLES ==="
              resources:
                requests:
                  cpu: {{ .Values.clusterCleanup.resources.requests.cpu }}
                  memory: {{ .Values.clusterCleanup.resources.requests.memory }}
                limits:
                  cpu: {{ .Values.clusterCleanup.resources.limits.cpu }}
                  memory: {{ .Values.clusterCleanup.resources.limits.memory }}
