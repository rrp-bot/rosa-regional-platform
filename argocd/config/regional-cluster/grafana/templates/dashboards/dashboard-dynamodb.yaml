apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-dynamodb
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
  annotations:
    k8s-sidecar-target-directory: "Infrastructure"
data:
  dynamodb.json: {{ .Files.Get "dashboards/infrastructure/dynamodb.json" | quote }}
