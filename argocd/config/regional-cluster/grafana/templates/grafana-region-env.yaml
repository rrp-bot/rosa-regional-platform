apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-region-env
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  AWS_DEFAULT_REGION: {{ required "global.aws_region is required" .Values.global.aws_region | quote }}
