{{- if .Values.thanos.targetGroup.arn }}
apiVersion: eks.amazonaws.com/v1
kind: TargetGroupBinding
metadata:
  name: thanos-receive
  namespace: {{ include "thanos-operator.namespace" . }}
  labels:
    {{- include "thanos-operator.labels" . | nindent 4 }}
  annotations:
    {{- include "thanos-operator.annotations" . | nindent 4 }}
spec:
  serviceRef:
    # Service created by thanos-community operator for the router
    name: {{ .Values.thanos.targetGroup.serviceName | default "thanos-receive-router-thanos-receive" }}
    port: {{ .Values.thanos.targetGroup.port | default 19291 }}
  targetGroupARN: {{ .Values.thanos.targetGroup.arn | quote }}
  targetType: {{ .Values.thanos.targetGroup.targetType | default "ip" }}
{{- end }}
