apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.hyperfleetAdapter0Chart.applicationName }}
  namespace: {{ .Values.hyperfleetAdapter0Chart.namespace }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.hyperfleetAdapter0Chart.project }}

  source:
    repoURL: {{ .Values.hyperfleetAdapter0Chart.source.repoURL }}
    targetRevision: {{ .Values.hyperfleetAdapter0Chart.source.targetRevision }}
    path: {{ .Values.hyperfleetAdapter0Chart.source.path }}
    helm:
      valuesObject:
        image:
          registry: quay.io/openshift-hyperfleet
          repository: hyperfleet-adapter
          tag: v0.1.1
          pullPolicy: Always

        replicaCount: 1
        broker:
          create: true
          type: rabbitmq  # Explicitly set broker type
          rabbitmq:
            enabled: false
            url: "amqps://placeholder@localhost:5671/"

        subscriber:
          parallelism: 1

        env:
          - name: BROKER_RABBITMQ_URL
            valueFrom:
              secretKeyRef:
                name: hyperfleet-adapter1-broker-credentials
                key: BROKER_RABBITMQ_URL

        serviceAccount:
          create: true
          annotations:
            eks.amazonaws.com/role-arn: ""
          name: hyperfleet-adapter1-sa

        extraVolumes:
          - name: secrets-store-inline
            csi:
              driver: secrets-store.csi.k8s.io
              readOnly: true
              volumeAttributes:
                secretProviderClass: hyperfleet-adapter1-secrets

        extraVolumeMounts:
          - name: secrets-store-inline
            mountPath: /mnt/secrets-store
            readOnly: true

        adapterConfig:
          log:
            level: debug
          create: true
          yaml: |
            {{ .Files.Get "adapter0-config.yaml" | nindent 12 }}

        adapterTaskConfig:
          create: true
          yaml: |
            {{ .Files.Get "adapter0-task-config.yaml" | nindent 12 }}

  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.hyperfleetAdapter0Chart.targetNamespace }}

  syncPolicy:
    {{- if .Values.hyperfleetAdapter0Chart.syncPolicy.automated }}
    automated:
      prune: {{ .Values.hyperfleetAdapter0Chart.syncPolicy.automated.prune }}
      selfHeal: {{ .Values.hyperfleetAdapter0Chart.syncPolicy.automated.selfHeal }}
    {{- end }}
    {{- if .Values.hyperfleetAdapter0Chart.syncPolicy.syncOptions }}
    syncOptions:
      {{- toYaml .Values.hyperfleetAdapter0Chart.syncPolicy.syncOptions | nindent 6 }}
    {{- end }}
