apiVersion: hyperfleet.redhat.com/v1alpha1
kind: AdapterTaskConfig
metadata:
  name: adapter0
  labels:
    hyperfleet.io/adapter-type: adapter0
    hyperfleet.io/component: adapter
spec:
  params:
    - name: "clusterId"
      source: "event.id"
      type: "string"
      required: true
    - name: "generationId"
      source: "event.generation"
      type: "int"
      required: true

  preconditions:
    - name: "clusterStatus"
      apiCall:
        method: "GET"
        url: "/clusters/{{ .clusterId }}"
        timeout: 10s
        retryAttempts: 3
        retryBackoff: "exponential"
      capture:
        - name: "clusterName"
          field: "name"
        - name: "generationId"
          field: "generation"
        - name: "timestamp"
          field: "created_time"
        - name: "readyConditionStatus"
          expression: |
            status.conditions.filter(c, c.type == "Ready").size() > 0
              ? status.conditions.filter(c, c.type == "Ready")[0].status
              : "False"

        - name: "placementClusterName"
          expression: |
            has(spec.placement) && spec.placement != ""
              ? spec.placement
              : "mc01"

        - name: "adapterName"
          expression: "\"adapter0\""  # TBC coming from config passed to params
          description: "Unique identifier for the adapter"

      # check if the cluster is not ready
      conditions:
        - field: "readyConditionStatus"
          operator: "equals"
          value: "False"

    - name: "validationCheck"
      # Valid CEL expression
      expression: |
        readyConditionStatus == "False"

  # Resources with valid K8s manifests deployed directly to Kubernetes
  resources:

    #------------------------------------------------
    # create a namespace on the regional cluster
    #------------------------------------------------
    - name: "clusterNamespace"
      transport:
        client: "kubernetes"
      manifest:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: "{{ .clusterId }}"
          labels:
            hyperfleet.io/cluster-id: "{{ .clusterId }}"
            hyperfleet.io/adapter: "{{ .adapterName }}"
            hyperfleet.io/resource-type: "namespace"
          annotations:
            hyperfleet.io/created-by: "hyperfleet-adapter"
            hyperfleet.io/generation: "{{ .generationId }}"
      discovery:
        byName: "{{ .clusterId }}"

    # RBAC resources for job execution
    - name: "jobServiceAccount"
      transport:
        client: "kubernetes"
      manifest:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: "{{ .clusterId }}"
          namespace: "{{ .clusterId }}"
          labels:
            hyperfleet.io/cluster-id: "{{ .clusterId }}"
            hyperfleet.io/resource-type: "service-account"
          annotations:
            hyperfleet.io/generation: "{{ .generationId }}"
      discovery:
        byName: "{{ .clusterId }}"
        namespace: "{{ .clusterId }}"

    - name: "statusReporterRole"
      transport:
        client: "kubernetes"
      manifest:
        apiVersion: rbac.authorization.k8s.io/v1
        kind: Role
        metadata:
          name: status-reporter
          namespace: "{{ .clusterId }}"
          labels:
            hyperfleet.io/cluster-id: "{{ .clusterId }}"
            hyperfleet.io/resource-type: "role"
          annotations:
            hyperfleet.io/generation: "{{ .generationId }}"
        rules:
          - apiGroups: [ "batch" ]
            resources: [ "jobs" ]
            verbs: [ "get" ]
          - apiGroups: [ "batch" ]
            resources: [ "jobs/status" ]
            verbs: [ "get", "update", "patch" ]
          - apiGroups: [ "" ]
            resources: [ "pods" ]
            verbs: [ "get", "list" ]
      discovery:
        byName: "status-reporter"
        namespace: "{{ .clusterId }}"

    - name: "statusReporterRoleBinding"
      transport:
        client: "kubernetes"
      manifest:
        apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        metadata:
          name: status-reporter
          namespace: "{{ .clusterId }}"
          labels:
            hyperfleet.io/cluster-id: "{{ .clusterId }}"
            hyperfleet.io/resource-type: "role-binding"
          annotations:
            hyperfleet.io/generation: "{{ .generationId }}"
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: Role
          name: status-reporter
        subjects:
          - kind: ServiceAccount
            name: "{{ .clusterId }}"
            namespace: "{{ .clusterId }}"
      discovery:
        byName: "status-reporter"
        namespace: "{{ .clusterId }}"

    - name: "adapter0Job"
      transport:
        client: "kubernetes"
      manifest:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: "adapter0-job-{{ .clusterId }}"
          namespace: "{{ .clusterId }}"
          labels:
            hyperfleet.io/cluster-id: "{{ .clusterId }}"
            hyperfleet.io/resource-type: "job"
          annotations:
            hyperfleet.io/generation: "{{ .generationId }}"
        spec:
          backoffLimit: 0
          activeDeadlineSeconds: 310
          template:
            metadata:
              labels:
                app: adapter0-job
                job-name: "adapter0-job-{{ .generationId }}"
            spec:
              serviceAccountName: "{{ .clusterId }}"
              restartPolicy: Never
              volumes:
              - name: results
                emptyDir: {}
              containers:
              - name: adapter0-job
                image: alpine:3.19
                imagePullPolicy: IfNotPresent
                command: ["/bin/sh", "-c"]
                args:
                  - |
                    set -e
                    RESULTS_PATH="${RESULTS_PATH:-/results/adapter-result.json}"
                    SIMULATE_RESULT="${SIMULATE_RESULT:-success}"
                    echo "Dummy GCP Validator starting..."
                    echo "Simulating result: ${SIMULATE_RESULT}"
                    echo "Results path: ${RESULTS_PATH}"
                    RESULTS_DIR=$(dirname "${RESULTS_PATH}")
                    mkdir -p "${RESULTS_DIR}"
                    case "${SIMULATE_RESULT}" in
                      success)
                        echo "Writing success result..."
                        cat > "${RESULTS_PATH}" <<EOF
                    {
                      "status": "success",
                      "reason": "ValidationPassed",
                      "message": "GCP environment validated successfully (simulated)",
                      "details": {
                        "simulation": true,
                        "checks_run": 5,
                        "checks_passed": 5,
                        "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                      }
                    }
                    EOF
                        echo "Success result written to ${RESULTS_PATH}"
                        exit 0
                        ;;
                      failure)
                        echo "Writing failure result..."
                        cat > "${RESULTS_PATH}" <<EOF
                    {
                      "status": "failure",
                      "reason": "MissingPermissions",
                      "message": "Service account lacks required IAM permissions (simulated)",
                      "details": {
                        "simulation": true,
                        "missing_permissions": ["compute.instances.list", "iam.serviceAccounts.get"],
                        "service_account": "dummy-sa@project.iam.gserviceaccount.com",
                        "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                      }
                    }
                    EOF
                        echo "Failure result written to ${RESULTS_PATH}"
                        exit 1
                        ;;
                      hang)
                        echo "Simulating hang (sleeping indefinitely)..."
                        sleep 9999999
                        ;;
                      crash)
                        echo "Simulating crash (exiting without writing results)..."
                        exit 1
                        ;;
                      invalid-json)
                        echo "Writing invalid JSON result..."
                        echo "{ this is not valid json }" > "${RESULTS_PATH}"
                        exit 0
                        ;;
                      missing-status)
                        echo "Writing result with missing status field..."
                        cat > "${RESULTS_PATH}" <<EOF
                    {
                      "reason": "TestReason",
                      "message": "This result is missing the status field"
                    }
                    EOF
                        exit 0
                        ;;
                      *)
                        echo "Unknown SIMULATE_RESULT value: ${SIMULATE_RESULT}"
                        cat > "${RESULTS_PATH}" <<EOF
                    {
                      "status": "success",
                      "reason": "ValidationPassed",
                      "message": "GCP environment validated successfully (default simulation)",
                      "details": {"simulation": true, "note": "Unknown SIMULATE_RESULT value, defaulted to success"}
                    }
                    EOF
                        exit 0
                        ;;
                    esac
                env:
                - name: SIMULATE_RESULT
                  value: "success"
                - name: RESULTS_PATH
                  value: "/results/adapter-result.json"
                volumeMounts:
                - name: results
                  mountPath: /results
                resources:
                  requests:
                    memory: "64Mi"
                    cpu: "100m"
                  limits:
                    memory: "128Mi"
                    cpu: "200m"

              - name: status-reporter
                image: registry.ci.openshift.org/ci/status-reporter:latest
                imagePullPolicy: Always
                env:
                - name: JOB_NAME
                  value: "adapter0-job-{{ .clusterId }}"
                - name: JOB_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: POD_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
                - name: RESULTS_PATH
                  value: "/results/adapter-result.json"
                - name: POLL_INTERVAL_SECONDS
                  value: "2"
                - name: MAX_WAIT_TIME_SECONDS
                  value: "300"
                - name: CONDITION_TYPE
                  value: "Available"
                - name: LOG_LEVEL
                  value: "info"
                - name: ADAPTER_CONTAINER_NAME
                  value: "adapter0-job"
                volumeMounts:
                - name: results
                  mountPath: /results
                resources:
                  requests:
                    memory: "64Mi"
                    cpu: "100m"
                  limits:
                    memory: "128Mi"
                    cpu: "200m"
      discovery:
        byName: "adapter0-job-{{ .clusterId }}"
        namespace: "{{ .clusterId }}"

  post:
    payloads:
      - name: "clusterStatusPayload"
        build:
          adapter: "{{ .metadata.name }}"
          conditions:
            - type: "ResourcesReady"
              status:
                expression: |
                  has(resources.clusterNamespace) && has(resources.clusterNamespace.status)
                  && has(resources.clusterNamespace.status.phase)
                  && resources.clusterNamespace.status.phase == "Active"
                  ? "True"
                  : "False"
              reason:
                expression: |
                  has(resources.clusterNamespace) && has(resources.clusterNamespace.status)
                  && has(resources.clusterNamespace.status.phase)
                  && resources.clusterNamespace.status.phase == "Active"
                  ? "NamespaceActive"
                  : "NamespaceNotReady"
              message:
                expression: |
                  has(resources.clusterNamespace) && has(resources.clusterNamespace.status)
                  && has(resources.clusterNamespace.status.phase)
                  && resources.clusterNamespace.status.phase == "Active"
                  ? "Cluster namespace is active and ready"
                  : "Cluster namespace is not yet active"

            - type: "DeploymentReady"
              status:
                expression: |
                  has(resources.testDeployment) && has(resources.testDeployment.status)
                  && resources.testDeployment.status.?readyReplicas.orValue(0) > 0
                  ? "True"
                  : "False"
              reason:
                expression: |
                  has(resources.testDeployment) && has(resources.testDeployment.status)
                  && resources.testDeployment.status.?readyReplicas.orValue(0) > 0
                  ? "DeploymentReady"
                  : "DeploymentNotReady"
              message:
                expression: |
                  has(resources.testDeployment) && has(resources.testDeployment.status)
                  ? "Deployment has " + string(resources.testDeployment.status.?readyReplicas.orValue(0)) + " ready replicas"
                  : "Deployment status not available"

            - type: "JobCompleted"
              status:
                expression: |
                  has(resources.adapter0Job) && has(resources.adapter0Job.status)
                  && resources.adapter0Job.status.?succeeded.orValue(0) > 0
                  ? "True"
                  : has(resources.adapter0Job) && has(resources.adapter0Job.status)
                    && resources.adapter0Job.status.?failed.orValue(0) > 0
                  ? "False"
                  : "Unknown"
              reason:
                expression: |
                  has(resources.adapter0Job) && has(resources.adapter0Job.status)
                  && resources.adapter0Job.status.?succeeded.orValue(0) > 0
                  ? "JobSucceeded"
                  : has(resources.adapter0Job) && has(resources.adapter0Job.status)
                    && resources.adapter0Job.status.?failed.orValue(0) > 0
                  ? "JobFailed"
                  : "JobPending"
              message:
                expression: |
                  has(resources.adapter0Job) && has(resources.adapter0Job.status)
                  && resources.adapter0Job.status.?succeeded.orValue(0) > 0
                  ? "Job completed successfully"
                  : has(resources.adapter0Job) && has(resources.adapter0Job.status)
                    && resources.adapter0Job.status.?failed.orValue(0) > 0
                  ? "Job failed"
                  : "Job is still running or pending"

            - type: "Health"
              status:
                expression: |
                  adapter.?executionStatus.orValue("") == "success"
                    && !adapter.?resourcesSkipped.orValue(false)
                  ? "True"
                  : "False"
              reason:
                expression: |
                  adapter.?executionStatus.orValue("") != "success"
                  ? "ExecutionFailed:" + adapter.?executionError.?phase.orValue("unknown")
                  : adapter.?resourcesSkipped.orValue(false)
                    ? "ResourcesSkipped"
                    : "Healthy"
              message:
                expression: |
                  adapter.?executionStatus.orValue("") == "success"
                    && !adapter.?resourcesSkipped.orValue(false)
                  ? "Adapter execution completed successfully"
                  : adapter.?resourcesSkipped.orValue(false)
                    ? "Resources skipped: " + adapter.?skipReason.orValue("unknown reason")
                    : "Adapter execution failed"

          # Use CEL expression for numeric fields to preserve type (not Go template which outputs strings)
          observed_generation:
            expression: "generation"
          observed_time: "{{ now | date \"2006-01-02T15:04:05Z07:00\" }}"

          data:
            namespace:
              name:
                expression: |
                  resources.?clusterNamespace.?metadata.?name.orValue("")
              phase:
                expression: |
                  resources.?clusterNamespace.?status.?phase.orValue("")
              creationTimestamp:
                expression: |
                  resources.?clusterNamespace.?metadata.?creationTimestamp.orValue("")
            configmap:
              name:
                expression: |
                  resources.?clusterConfig.?metadata.?name.orValue("")
              creationTimestamp:
                expression: |
                  resources.?clusterConfig.?metadata.?creationTimestamp.orValue("")
              data:
                expression: |
                  resources.?clusterConfig.?data.orValue({})
            deployment:
              name:
                expression: |
                  resources.?testDeployment.?metadata.?name.orValue("")
              replicas:
                expression: |
                  resources.?testDeployment.?status.?replicas.orValue(0)
              readyReplicas:
                expression: |
                  resources.?testDeployment.?status.?readyReplicas.orValue(0)
              availableReplicas:
                expression: |
                  resources.?testDeployment.?status.?availableReplicas.orValue(0)
              conditions:
                expression: |
                  resources.?testDeployment.?status.?conditions.orValue([])
            job:
              name:
                expression: |
                  resources.?adapter0Job.?metadata.?name.orValue("")
              active:
                expression: |
                  resources.?adapter0Job.?status.?active.orValue(0)
              succeeded:
                expression: |
                  resources.?adapter0Job.?status.?succeeded.orValue(0)
              failed:
                expression: |
                  resources.?adapter0Job.?status.?failed.orValue(0)
              completionTime:
                expression: |
                  resources.?adapter0Job.?status.?completionTime.orValue("")
              conditions:
                expression: |
                  resources.?adapter0Job.?status.?conditions.orValue([])

    postActions:
      - name: "reportClusterStatus"
        apiCall:
          method: "POST"
          url: "/clusters/{{ .clusterId }}/statuses"
          headers:
            - name: "Content-Type"
              value: "application/json"
          body: "{{ .clusterStatusPayload }}"
