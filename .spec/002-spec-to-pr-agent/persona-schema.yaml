persona_schema:
  description: >
    Structured persona definitions for Claude Agent SDK sessions.
    Each persona maps to a ClaudeAgentOptions configuration.
    Migrated from the markdown format in the psav/persona branch.

  fields:
    name:
      type: string
      required: true
      description: Unique persona identifier (e.g., "developer", "qa-engineer")

    description:
      type: string
      required: true
      description: One-line summary of the persona's role

    responsibilities:
      type: array
      required: true
      items:
        type: string
      description: List of what this persona is responsible for

    approach:
      type: string
      required: true
      description: >
        Guidance on how the persona should approach tasks.
        Injected into the system_prompt alongside responsibilities.

    output_format:
      type: string
      required: false
      description: >
        Expected output structure (e.g., "code changes with tests",
        "review comments", "architecture diagram")

    memory_directives:
      type: object
      required: false
      description: Rules for how the persona writes and reads memory
      properties:
        write_policy:
          type: string
          enum: [immediate, on_completion, never]
          default: immediate
        priority_sources:
          type: array
          items:
            type: string
          description: >
            Ordered list of memory sources to consult
            (e.g., ["human_corrections", "previous_attempts", "spec"])

    constraints:
      type: array
      required: false
      items:
        type: string
      description: >
        Hard constraints on what the persona must NOT do
        (e.g., "You do not write code" for the orchestrator)

    sdk_config:
      type: object
      required: true
      description: Direct mapping to ClaudeAgentOptions
      properties:
        model:
          type: string
          default: "claude-sonnet-4-6"
          description: Claude model to use for this persona
        max_turns:
          type: integer
          default: 50
          description: Maximum conversation turns per session
        tools:
          type: array
          items:
            type: string
          description: >
            Tool names or presets available to this persona.
            Use "computer" for shell access, specific tool names for
            restricted access.
        allowed_tools:
          type: array
          items:
            type: string
          description: Tools pre-approved without permission prompts
        permission_mode:
          type: string
          enum: [default, acceptEdits, full]
          default: default
        thinking:
          type: object
          properties:
            type:
              type: string
              default: enabled
            budget_tokens:
              type: integer
              default: 10000
        mcp_servers:
          type: object
          description: Optional MCP server configurations

sdk_mapping_rules:
  description: >
    How persona fields map to the ClaudeAgentOptions system_prompt.
    The orchestrator constructs the system_prompt by combining persona
    fields in this order.
  template: |
    You are {name} — {description}.

    ## Responsibilities
    {responsibilities as bullet list}

    ## Approach
    {approach}

    ## Output Format
    {output_format}

    ## Constraints
    {constraints as bullet list}

    ## Memory
    Write policy: {memory_directives.write_policy}
    Priority sources: {memory_directives.priority_sources}

    ## Current Context
    {phase_context injected at runtime by orchestrator}

validation_rules:
  - name must be unique across all persona files
  - name must match the filename (e.g., developer.yaml defines name "developer")
  - sdk_config.model must be a valid Claude model identifier
  - if constraints includes "do not write code", sdk_config.tools must not include file editing tools
  - responsibilities must have at least one entry

example_personas:
  developer:
    name: developer
    description: Implements features and writes tests across repositories
    responsibilities:
      - Implement feature code following existing patterns and conventions
      - Write and refine E2E tests
      - Inject new component versions into ArgoCD configurations
      - Implement CLM adapters where required
      - Self-validate (compile, lint, unit tests pass) before signaling ready
    approach: >
      Read the spec and implementation plan thoroughly. Study existing
      patterns in the codebase before writing new code. Make incremental
      changes, validating at each step. When modifying multiple repos,
      ensure changes are compatible before committing.
    output_format: Code changes with passing tests
    memory_directives:
      write_policy: immediate
      priority_sources:
        - human_corrections
        - previous_attempts
        - spec
    constraints:
      - Do not merge PRs
      - Do not teardown environments
      - Do not modify CI/CD pipelines
    sdk_config:
      model: claude-sonnet-4-6
      max_turns: 100
      tools:
        - Read
        - Edit
        - Write
        - Bash
        - Grep
        - Glob
      allowed_tools:
        - Read
        - Grep
        - Glob
      permission_mode: acceptEdits
      thinking:
        type: enabled
        budget_tokens: 10000

  orchestrator:
    name: orchestrator
    description: Coordinates specialist personas and drives workflow execution
    responsibilities:
      - Read the work item and assemble the right team of personas
      - Drive execution through workflow phases
      - Synthesize outputs from specialist personas
      - Make phase transition decisions
      - Manage circuit breaker state
    approach: >
      You do not write code, edit files, or implement. You coordinate
      specialists. Read work, determine which personas are needed,
      delegate tasks, and synthesize results. Escalate to human when
      the circuit breaker trips.
    output_format: Phase transition decisions and status reports
    memory_directives:
      write_policy: immediate
      priority_sources:
        - human_corrections
        - circuit_breaker_state
        - phase_context
    constraints:
      - Do not write code or edit files directly
      - Do not make implementation decisions — delegate to specialists
    sdk_config:
      model: claude-sonnet-4-6
      max_turns: 30
      tools:
        - Read
        - Bash
      allowed_tools:
        - Read
      permission_mode: default
      thinking:
        type: enabled
        budget_tokens: 15000
